{%extends 'corte/base.html'%}

{%block body%}
<section>
    <h1>
        Seleccionar tu corte de pelo:
    </h1>
    <article>
        {% for corte in cortes %}
        <h2>
            {{ corte.name }}
        </h2>
        <p> {{ corte.precio }}</p>
        <p>{{ corte.descripcion }}</p>
        <button><a href="{% url 'detail' id=corte.id %}">seleccionar corte</a></button>
        {%endfor%}
    </article>
</section>
{%endblock%}
